<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LitRPG Con 2026 — Panel Finder</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap');
  :root {
    --teal:#00C9B1;--teal-dim:#008f7e;--teal-glow:rgba(0,201,177,.15);
    --gold:#E8C86A;--bg:#0a0d12;--surface:#111620;--surface2:#181f2e;
    --border:rgba(0,201,177,.18);--text:#d4dde8;--muted:#6a7a8e;
    --red:#e05c5c;--green:#4ade80;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh}

  /* HEADER */
  header{background:linear-gradient(180deg,#060a0f 0%,var(--bg) 100%);border-bottom:1px solid var(--border);padding:28px 24px 22px;text-align:center;position:relative}
  header::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--teal),transparent)}
  .header-eyebrow{font-size:11px;font-weight:500;letter-spacing:.22em;text-transform:uppercase;color:var(--teal);margin-bottom:8px}
  h1{font-family:'Cinzel',serif;font-size:clamp(1.6rem,5vw,2.8rem);font-weight:900;color:#fff;letter-spacing:.04em;line-height:1.1}
  h1 span{color:var(--teal)}
  .header-sub{margin-top:6px;font-size:13px;color:var(--muted);letter-spacing:.05em}
  .admin-btn{position:absolute;top:16px;right:16px;background:transparent;border:1px solid var(--border);color:var(--muted);font-size:11px;padding:5px 10px;border-radius:5px;cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif}
  .admin-btn:hover{border-color:var(--teal);color:var(--teal)}
  .admin-btn.active{border-color:var(--gold);color:var(--gold)}

  /* SEARCH */
  .search-wrap{max-width:680px;margin:28px auto 0;padding:0 20px}
  .search-input-wrap{position:relative}
  .search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--teal);font-size:18px;pointer-events:none}
  #search{width:100%;padding:14px 16px 14px 46px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:#fff;font-size:16px;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s,box-shadow .2s}
  #search:focus{border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-glow)}
  #search::placeholder{color:var(--muted)}
  .tabs{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
  .tab{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;letter-spacing:.04em;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .15s;font-family:'Inter',sans-serif}
  .tab:hover{color:var(--text);border-color:var(--teal-dim)}
  .tab.active{background:var(--teal);color:#000;border-color:var(--teal);font-weight:600}

  /* MAIN */
  main{max-width:960px;margin:0 auto;padding:28px 20px 60px}
  .results-count{font-size:12px;color:var(--muted);margin-bottom:16px;letter-spacing:.04em}
  .results-count strong{color:var(--teal)}

  /* PARTICIPANT CARD */
  .panelist-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:16px;overflow:hidden;transition:border-color .2s}
  .panelist-card:hover{border-color:var(--teal-dim)}
  .panelist-header{display:flex;align-items:center;gap:12px;padding:14px 18px;cursor:pointer}
  .panelist-avatar{width:44px;height:44px;border-radius:50%;object-fit:cover;border:2px solid var(--border);background:var(--surface2);flex-shrink:0}
  .panelist-avatar-placeholder{width:44px;height:44px;border-radius:50%;background:var(--surface2);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;color:var(--muted)}
  .panelist-info{flex:1;min-width:0}
  .panelist-name{font-family:'Cinzel',serif;font-size:14px;font-weight:700;color:#fff}
  .panelist-tagline{font-size:11px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .panelist-meta-chips{display:flex;gap:5px;margin-top:4px;flex-wrap:wrap}
  .meta-chip{font-size:10px;padding:1px 6px;border-radius:3px;border:1px solid;white-space:nowrap}
  .meta-chip.booth{border-color:rgba(232,200,106,.3);color:var(--gold)}
  .meta-chip.pub{border-color:rgba(0,201,177,.3);color:var(--teal)}
  .panel-count-badge{background:var(--teal-glow);border:1px solid var(--teal-dim);color:var(--teal);font-size:11px;font-weight:600;padding:3px 9px;border-radius:12px;white-space:nowrap}
  .chevron{color:var(--muted);font-size:14px;transition:transform .2s}
  .panelist-card.open .chevron{transform:rotate(180deg)}
  .panelist-body{display:none;border-top:1px solid var(--border)}
  .panelist-card.open .panelist-body{display:block}

  /* BODY SECTIONS */
  .body-tabs{display:flex;border-bottom:1px solid var(--border)}
  .body-tab{flex:1;padding:8px;font-size:11px;font-weight:600;text-align:center;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;transition:all .15s}
  .body-tab.active{color:var(--teal);border-bottom-color:var(--teal)}
  .body-section{display:none;padding:16px 18px}
  .body-section.active{display:block}

  /* PANEL ITEMS */
  .panel-item{padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04);display:grid;grid-template-columns:auto 1fr;gap:10px;align-items:start}
  .panel-item:last-child{border-bottom:none}
  .day-pill{font-size:10px;font-weight:700;letter-spacing:.08em;padding:3px 8px;border-radius:4px;text-transform:uppercase;white-space:nowrap;margin-top:2px}
  .day-fri{background:rgba(58,123,213,.2);color:#7eb3ff;border:1px solid rgba(58,123,213,.3)}
  .day-sat{background:rgba(155,89,182,.2);color:#c39bd3;border:1px solid rgba(155,89,182,.3)}
  .day-sun{background:rgba(230,126,34,.2);color:#f0a868;border:1px solid rgba(230,126,34,.3)}
  .panel-title{font-size:13px;font-weight:600;color:#e2e8f0;line-height:1.4;margin-bottom:3px}
  .panel-meta{font-size:11px;color:var(--muted);display:flex;flex-wrap:wrap;gap:10px}
  .panel-role{color:var(--gold);font-weight:500}

  /* PROFILE SECTION */
  .profile-grid{display:grid;grid-template-columns:80px 1fr;gap:14px;align-items:start}
  .profile-photo{width:80px;height:80px;border-radius:8px;object-fit:cover;border:2px solid var(--border)}
  .profile-photo-placeholder{width:80px;height:80px;border-radius:8px;background:var(--surface2);border:2px dashed var(--border);display:flex;align-items:center;justify-content:center;font-size:28px;color:var(--muted)}
  .bio-text{font-size:12px;color:var(--text);line-height:1.6;margin-bottom:10px}
  .social-links{display:flex;flex-wrap:wrap;gap:6px}
  .social-link{font-size:11px;color:var(--teal);text-decoration:none;background:var(--teal-glow);border:1px solid var(--teal-dim);padding:3px 8px;border-radius:4px}
  .social-link:hover{background:var(--teal);color:#000}
  .info-row{display:flex;gap:8px;margin-bottom:6px;align-items:baseline;flex-wrap:wrap}
  .info-label{font-size:11px;color:var(--muted);min-width:70px;flex-shrink:0}
  .info-val{font-size:12px;color:var(--text)}
  .series-list{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px}
  .series-tag{font-size:11px;background:rgba(232,200,106,.1);border:1px solid rgba(232,200,106,.25);color:var(--gold);padding:2px 8px;border-radius:4px}

  /* FAN CONNECTIONS */
  .fan-event{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:11px 13px;margin-bottom:8px}
  .fan-event:last-child{margin-bottom:0}
  .fan-event-title{font-size:13px;font-weight:600;color:#e2e8f0;margin-bottom:4px}
  .fan-event-meta{font-size:11px;color:var(--muted);display:flex;flex-wrap:wrap;gap:10px}
  .fan-event-desc{font-size:12px;color:var(--muted);margin-top:5px;font-style:italic}
  .no-events{font-size:12px;color:var(--muted);font-style:italic;padding:4px 0}

  /* SCHEDULE VIEW */
  .schedule-day{margin-bottom:36px}
  .day-heading{font-family:'Cinzel',serif;font-size:18px;font-weight:700;color:#fff;padding:12px 0 8px;border-bottom:1px solid var(--border);margin-bottom:16px;display:flex;align-items:center;gap:12px}
  .day-dot{width:10px;height:10px;border-radius:50%;display:inline-block}
  .time-block{margin-bottom:20px}
  .time-label{font-size:11px;font-weight:600;letter-spacing:.1em;color:var(--teal);text-transform:uppercase;margin-bottom:8px}
  .panel-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:8px;transition:border-color .15s}
  .panel-card:hover{border-color:var(--teal-dim)}
  .panel-card-title{font-weight:600;font-size:14px;color:#e2e8f0;margin-bottom:4px}
  .panel-card-loc{font-size:11px;color:var(--muted);margin-bottom:6px}
  .panel-card-desc{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:8px}
  .panelist-chips{display:flex;flex-wrap:wrap;gap:5px}
  .chip{font-size:11px;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:2px 8px;border-radius:4px;cursor:pointer;transition:all .15s}
  .chip.mod-chip{border-color:rgba(232,200,106,.3);color:var(--gold)}
  .chip:hover{border-color:var(--teal);color:var(--teal)}

  /* EVENTS VIEW */
  .events-grid{display:grid;gap:12px}
  .event-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 18px}
  .event-card-header{display:flex;justify-content:space-between;align-items:start;gap:10px;margin-bottom:8px}
  .event-card-title{font-family:'Cinzel',serif;font-size:14px;font-weight:700;color:#fff}
  .event-card-host{font-size:12px;color:var(--teal);margin-top:3px;cursor:pointer}
  .event-card-host:hover{text-decoration:underline}
  .event-time-badge{font-size:10px;font-weight:600;padding:3px 8px;border-radius:4px;white-space:nowrap;background:rgba(0,201,177,.15);border:1px solid var(--teal-dim);color:var(--teal)}
  .event-meta{font-size:11px;color:var(--muted);display:flex;gap:12px;flex-wrap:wrap;margin-top:5px}
  .event-desc{font-size:12px;color:var(--text);line-height:1.5;margin-top:8px;font-style:italic}

  /* LOGIN OVERLAY */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
  .overlay.hidden{display:none}
  .login-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:32px;width:320px;text-align:center}
  .login-box h2{font-family:'Cinzel',serif;font-size:18px;color:#fff;margin-bottom:6px}
  .login-box p{font-size:12px;color:var(--muted);margin-bottom:20px}
  .login-input{width:100%;padding:11px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:#fff;font-family:'Inter',sans-serif;font-size:14px;outline:none;margin-bottom:10px;transition:border-color .2s}
  .login-input:focus{border-color:var(--teal)}
  .login-btn{width:100%;padding:11px;background:var(--teal);color:#000;font-weight:700;font-size:14px;border:none;border-radius:7px;cursor:pointer;font-family:'Inter',sans-serif;transition:opacity .2s}
  .login-btn:hover{opacity:.85}
  .login-err{font-size:12px;color:var(--red);margin-top:6px;min-height:16px}
  .login-cancel{font-size:11px;color:var(--muted);cursor:pointer;margin-top:12px;display:block;text-decoration:underline}

  /* ADMIN PANEL */
  .admin-wrap{background:var(--surface);border:1px solid var(--gold);border-radius:10px;padding:20px;margin-bottom:24px}
  .admin-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
  .admin-title{font-family:'Cinzel',serif;font-size:16px;color:var(--gold)}
  .admin-select{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'Inter',sans-serif;font-size:13px;padding:8px 12px;border-radius:6px;outline:none;width:100%;margin-bottom:14px}
  .admin-select:focus{border-color:var(--teal)}
  .admin-form{display:grid;gap:10px}
  .admin-field label{display:block;font-size:11px;color:var(--muted);margin-bottom:4px;letter-spacing:.04em;text-transform:uppercase}
  .admin-field input,.admin-field textarea{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'Inter',sans-serif;font-size:13px;padding:9px 12px;border-radius:6px;outline:none;transition:border-color .2s}
  .admin-field input:focus,.admin-field textarea:focus{border-color:var(--teal)}
  .admin-field textarea{resize:vertical;min-height:70px}
  .admin-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .admin-section-title{font-size:11px;font-weight:700;color:var(--teal);letter-spacing:.1em;text-transform:uppercase;padding:6px 0 4px;border-bottom:1px solid var(--border);margin-bottom:4px}
  .admin-save-btn{background:var(--teal);color:#000;font-weight:700;font-size:13px;border:none;border-radius:6px;padding:10px 20px;cursor:pointer;font-family:'Inter',sans-serif;transition:opacity .2s}
  .admin-save-btn:hover{opacity:.85}
  .admin-cancel-btn{background:transparent;border:1px solid var(--border);color:var(--muted);font-family:'Inter',sans-serif;font-size:13px;padding:10px 20px;border-radius:6px;cursor:pointer;transition:all .2s}
  .admin-cancel-btn:hover{border-color:var(--red);color:var(--red)}
  .btn-row{display:flex;gap:8px;margin-top:4px}
  .save-feedback{font-size:12px;color:var(--green);margin-left:10px;opacity:0;transition:opacity .3s}
  .save-feedback.show{opacity:1}

  /* FAN EVENT FORM */
  .fan-events-admin{margin-top:10px}
  .fan-event-item-admin{background:rgba(0,0,0,.2);border:1px solid var(--border);border-radius:6px;padding:10px;margin-bottom:8px;position:relative}
  .fan-event-remove{position:absolute;top:8px;right:8px;background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:16px;line-height:1;transition:color .15s}
  .fan-event-remove:hover{color:var(--red)}
  .add-event-btn{background:transparent;border:1px dashed var(--border);color:var(--muted);font-family:'Inter',sans-serif;font-size:12px;padding:8px;width:100%;border-radius:6px;cursor:pointer;transition:all .2s;margin-top:4px}
  .add-event-btn:hover{border-color:var(--teal);color:var(--teal)}

  /* MEETUP CARDS */
  .mg-grid{display:grid;gap:12px;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));margin-bottom:8px}
  .mg-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:border-color .2s}
  .mg-card:hover{border-color:var(--teal-dim)}
  .mg-card-inner{display:flex;gap:0;align-items:stretch}
  .mg-photo-wrap{flex-shrink:0;width:90px}
  .mg-photo{width:90px;height:100%;object-fit:cover;display:block;min-height:90px}
  .mg-photo-placeholder{width:90px;min-height:90px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:28px;color:var(--muted);flex-shrink:0}
  .mg-info{padding:14px 14px 14px 14px;flex:1;min-width:0;display:flex;flex-direction:column;gap:4px}
  .mg-name{font-family:'Cinzel',serif;font-size:13px;font-weight:700;color:var(--teal);cursor:pointer;line-height:1.3}
  .mg-name:hover{text-decoration:underline}
  .mg-event-title{font-size:13px;font-weight:600;color:#e2e8f0;line-height:1.3}
  .mg-meta{font-size:11px;color:var(--muted);display:flex;flex-direction:column;gap:3px;margin-top:2px}
  .mg-desc{font-size:12px;color:var(--text);line-height:1.5;margin-top:4px;font-style:italic}
  .mg-room-filters{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--border)}
  .mg-room-pill{padding:5px 12px;border-radius:16px;font-size:11px;font-weight:500;letter-spacing:.03em;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .15s;font-family:'Inter',sans-serif}
  .mg-room-pill:hover{color:var(--text);border-color:var(--teal-dim)}
  .mg-room-pill.active{background:var(--teal);color:#000;border-color:var(--teal);font-weight:600}

  /* MEETINGS LOG */
  .meetings-wrap{background:var(--surface);border:1px solid rgba(232,200,106,.35);border-radius:10px;padding:20px;margin-bottom:24px}
  .meetings-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:12px;flex-wrap:wrap}
  .meetings-title{font-family:'Cinzel',serif;font-size:15px;color:var(--gold)}
  .meetings-subtitle{font-size:11px;color:var(--muted);margin-top:2px}
  .add-meeting-btn{background:var(--gold);color:#000;font-weight:700;font-size:12px;border:none;border-radius:6px;padding:8px 14px;cursor:pointer;font-family:'Inter',sans-serif;white-space:nowrap;transition:opacity .2s}
  .add-meeting-btn:hover{opacity:.85}
  .meeting-form-wrap{background:rgba(0,0,0,.25);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:14px}
  .meeting-form-title{font-size:12px;font-weight:700;color:var(--gold);letter-spacing:.06em;text-transform:uppercase;margin-bottom:12px}
  .meeting-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:10px;position:relative}
  .meeting-card:last-child{margin-bottom:0}
  .meeting-card-header{display:flex;justify-content:space-between;align-items:start;gap:10px;margin-bottom:8px}
  .meeting-participants{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
  .meeting-participant-chip{font-size:11px;background:rgba(232,200,106,.1);border:1px solid rgba(232,200,106,.3);color:var(--gold);padding:2px 8px;border-radius:4px;cursor:pointer;transition:all .15s}
  .meeting-participant-chip:hover{background:rgba(232,200,106,.2)}
  .meeting-meta{font-size:11px;color:var(--muted);display:flex;flex-wrap:wrap;gap:10px;margin-bottom:6px}
  .meeting-topic{font-size:12px;color:var(--text);line-height:1.5;font-style:italic}
  .meeting-remove{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:15px;line-height:1;padding:0 4px;transition:color .15s;flex-shrink:0}
  .meeting-remove:hover{color:var(--red)}
  .meeting-id{font-size:10px;color:var(--muted);opacity:.5;margin-top:6px}
  .meetings-empty{font-size:13px;color:var(--muted);font-style:italic;text-align:center;padding:24px 0}
  .participant-search-dropdown{position:relative}
  .participant-search-input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'Inter',sans-serif;font-size:13px;padding:9px 12px;border-radius:6px;outline:none;transition:border-color .2s}
  .participant-search-input:focus{border-color:var(--gold)}
  .participant-dropdown-list{position:absolute;top:100%;left:0;right:0;background:var(--surface);border:1px solid var(--border);border-top:none;border-radius:0 0 6px 6px;max-height:180px;overflow-y:auto;z-index:50;display:none}
  .participant-dropdown-list.open{display:block}
  .participant-dropdown-item{padding:8px 12px;font-size:13px;cursor:pointer;color:var(--text);transition:background .1s}
  .participant-dropdown-item:hover{background:var(--teal-glow);color:var(--teal)}
  .selected-participants{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;min-height:24px}
  .sel-chip{font-size:11px;background:rgba(232,200,106,.15);border:1px solid rgba(232,200,106,.35);color:var(--gold);padding:3px 8px;border-radius:4px;cursor:pointer;display:flex;align-items:center;gap:5px}
  .sel-chip-x{font-size:12px;opacity:.7}
  .sel-chip:hover .sel-chip-x{opacity:1}

  /* EMPTY */
  .empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
  .empty-state .icon{font-size:48px;margin-bottom:12px}
  .empty-state p{font-size:14px}

  @media(max-width:500px){
    .panel-item{grid-template-columns:1fr;gap:6px}
    .admin-row{grid-template-columns:1fr}
    .profile-grid{grid-template-columns:1fr}
  }
</style>
</head>
<body>

<!-- LOGIN OVERLAY -->
<div class="overlay hidden" id="loginOverlay">
  <div class="login-box" id="loginBox">
    <h2>⚔ Admin Sign In</h2>
    <p>Sign in with your admin email and password.</p>
    <input type="email" class="login-input" id="loginEmail" placeholder="Email…" autocomplete="email" style="margin-bottom:8px">
    <input type="password" class="login-input" id="loginInput" placeholder="Password…" autocomplete="current-password">
    <button class="login-btn" id="loginBtn" onclick="attemptLogin()">Sign In</button>
    <div class="login-err" id="loginErr"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px">
      <span class="login-cancel" onclick="closeLogin()">Cancel</span>
      <span class="login-cancel" onclick="showResetForm()" style="color:var(--muted);font-size:11px">Forgot password?</span>
    </div>
  </div>

}
function getEffectiveBio(name) {
  const p = getProfile(name);
  if (p.bio) return p.bio;
  if (featuredGuests[name]) return featuredGuests[name].bio;
  return '';
}
function getEffectiveSeries(name) {

function buildIndex() {
  const map = {};
  panels.forEach(panel => {
    const people = [];
    if (panel.moderator) people.push({name:panel.moderator,role:'Moderator'});
    (panel.panelists||[]).forEach(n=>people.push({name:n,role:'Panelist'}));
    (panel.guests||[]).forEach(n=>people.push({name:n,role:'Guest Speaker'}));
    people.forEach(({name,role})=>{
      if(!map[name]) map[name]=[];
      map[name].push({panel,role});
    });
  });
  return map;
}
const participantIndex = buildIndex();
const sortedNames = Object.keys(participantIndex).sort((a,b)=>a.localeCompare(b));

async function sbFetch(path, opts={}) {
  const headers = {
    'apikey': SUPABASE_ANON,
    'Content-Type': 'application/json',
    ...(sbSession ? {'Authorization': `Bearer ${sbSession.access_token}`} : {}),
    ...opts.headers
  };
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {...opts, headers});
  if (!res.ok) {
    const err = await res.text();
    throw new Error(err);
  }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

async function sbAuthFetch(path, body) {
  const res = await fetch(`${SUPABASE_URL}/auth/v1/${path}`, {
    method: 'POST',
    headers: {'apikey': SUPABASE_ANON, 'Content-Type': 'application/json'},
    body: JSON.stringify(body)
  });
  return res.json();
}

// ── PROFILES ──
async function loadProfiles() {
  if (!sbSession) return;
  try {
    const rows = await sbFetch('profiles?select=*');
    profiles = {};
    (rows||[]).forEach(r => {
      profiles[r.name] = {
        photo: r.photo||'', bio: r.bio||'', publisher: r.publisher||'',
        booth: r.booth||'', series: r.series||[], social: r.social||{},
        fanEvents: r.fan_events||[]
      };
    });
  } catch(e) { console.error('loadProfiles:', e); }
}

async function saveProfile(name) {
  if (!sbSession || !profiles[name]) return;
  const p = profiles[name];
  await sbFetch('profiles', {
    method: 'POST',
    headers: {'Prefer': 'resolution=merge-duplicates'},
    body: JSON.stringify({
      name, photo: p.photo||null, bio: p.bio||null,
      publisher: p.publisher||null, booth: p.booth||null,
      series: p.series||[], social: p.social||{},
      fan_events: p.fanEvents||[], updated_at: new Date().toISOString()
    })
  });
}

// ── MEETINGS ──
async function loadMeetings() {
  if (!sbSession) return;
  try {
    const [rows, parts] = await Promise.all([
      sbFetch('meetings?select=*&order=created_at.asc'),
      sbFetch('meeting_participants?select=*')
    ]);
    const byId = {};
    (rows||[]).forEach(r => {
      byId[r.id] = {
        id: r.id, datetime: r.datetime, hotelLocation: r.hotel_location,
        topic: r.topic, createdAt: r.created_at, participants: []
      };
    });
    (parts||[]).forEach(p => { if (byId[p.meeting_id]) byId[p.meeting_id].participants.push(p.participant_name); });
    meetings = Object.values(byId);
  } catch(e) { console.error('loadMeetings:', e); }
}

async function saveMeetingToDb(meeting) {
  if (!sbSession) return;
  await sbFetch('meetings', {
    method: 'POST',
    headers: {'Prefer': 'resolution=merge-duplicates'},
    body: JSON.stringify({
      id: meeting.id, datetime: meeting.datetime||null,
      hotel_location: meeting.hotelLocation||null,
      topic: meeting.topic||null, created_at: meeting.createdAt
    })
  });
  if (meeting.participants.length) {
    await sbFetch('meeting_participants', {
      method: 'POST',
      headers: {'Prefer': 'resolution=merge-duplicates'},
      body: JSON.stringify(meeting.participants.map(p => ({meeting_id: meeting.id, participant_name: p})))
    });
  }
}

async function deleteMeetingFromDb(id) {
  if (!sbSession) return;
  await sbFetch(`meetings?id=eq.${encodeURIComponent(id)}`, {method: 'DELETE'});
}

async function attemptLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginInput').value;
  const errEl = document.getElementById('loginErr');
  const btn = document.getElementById('loginBtn');
  if (!email || !password) { errEl.textContent = 'Enter your email and password.'; return; }
  btn.textContent = 'Signing in…'; btn.disabled = true; errEl.textContent = '';
  try {
    const data = await sbAuthFetch('token?grant_type=password', {email, password});
    if (data.error || !data.access_token) {
      errEl.textContent = data.error_description || data.error || 'Sign-in failed. Try again.';
      btn.textContent = 'Sign In'; btn.disabled = false;
      return;
    }
    sbSession = data;
    document.getElementById('loginOverlay').classList.add('hidden');
    document.getElementById('loginEmail').value = '';
    document.getElementById('loginInput').value = '';
    btn.textContent = 'Sign In'; btn.disabled = false;
    await loadProfiles();
    await loadMeetings();
    setAdminUI(true);
  } catch(e) {
    errEl.textContent = 'Connection error. Check your network.';
    btn.textContent = 'Sign In'; btn.disabled = false;
  }
}

function closeLogin() {
  document.getElementById('loginOverlay').classList.add('hidden');
  document.getElementById('loginEmail').value = '';
  document.getElementById('loginInput').value = '';
  document.getElementById('loginErr').textContent = '';
  document.getElementById('resetBtn').textContent = 'Send Reset Link';
  document.getElementById('resetBtn').disabled = false;
  showLoginForm();
}
function showResetForm() {
  document.getElementById('loginBox').style.display = 'none';
  document.getElementById('resetBox').style.display = '';
  document.getElementById('resetEmail').value = document.getElementById('loginEmail').value;
  document.getElementById('resetMsg').textContent = '';

function showLoginForm() {

async function sendReset() {
  const email = document.getElementById('resetEmail').value.trim();
  const msgEl = document.getElementById('resetMsg');
  const btn = document.getElementById('resetBtn');
  if (!email) { msgEl.textContent = 'Enter your email address.'; msgEl.style.color='var(--red)'; return; }
  btn.textContent = 'Sending…'; btn.disabled = true; msgEl.textContent = '';
  try {
    const res = await fetch(`${SUPABASE_URL}/auth/v1/recover`, {
      method: 'POST',
      headers: {'apikey': SUPABASE_ANON, 'Content-Type': 'application/json'},
      body: JSON.stringify({email})
    });
    if (res.ok) {
      msgEl.style.color = 'var(--teal)';
      msgEl.textContent = '✓ Reset link sent! Check your email.';
      btn.textContent = 'Sent';
    } else {
      const err = await res.json();
      msgEl.style.color = 'var(--red)';
      msgEl.textContent = err.msg || err.error_description || 'Something went wrong.';
      btn.textContent = 'Send Reset Link'; btn.disabled = false;
    }
  } catch(e) {
    msgEl.style.color = 'var(--red)';
    msgEl.textContent = 'Connection error.';
    btn.textContent = 'Send Reset Link'; btn.disabled = false;
  }
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function escA(s){return String(s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function dayPill(day){const s=day==='Friday'?'Fri':day==='Saturday'?'Sat':'Sun';const c=day==='Friday'?'day-fri':day==='Saturday'?'day-sat':'day-sun';return`<span class="day-pill ${c}">${s}</span>`}
function avatarHtml(name,size='sm'){
  const photo=getEffectivePhoto(name);
  if(size==='lg') return photo?`<img class="profile-photo" src="${esc(photo)}" alt="${esc(name)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`+`<div class="profile-photo-placeholder" style="display:none">👤</div>`:`<div class="profile-photo-placeholder">👤</div>`;
  return photo?`<img class="panelist-avatar" src="${esc(photo)}" alt="${esc(name)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`+`<div class="panelist-avatar-placeholder" style="display:none">👤</div>`:`<div class="panelist-avatar-placeholder">👤</div>`;
}

function renderPeopleView(q) {
  const ql = q.toLowerCase();
  const filtered = sortedNames.filter(name => {
    if (!ql) return true;
    if (name.toLowerCase().includes(ql)) return true;
    const p = getProfile(name);
    if ((p.series||[]).some(s=>s.toLowerCase().includes(ql))) return true;
    if ((p.publisher||'').toLowerCase().includes(ql)) return true;
    return participantIndex[name].some(({panel})=>
      panel.title.toLowerCase().includes(ql)||panel.description.toLowerCase().includes(ql)||panel.location?.toLowerCase().includes(ql)
    );
  });
  if (!filtered.length) return emptyState('No adventurers found.');
  const countLabel = q ? `<strong>${filtered.length}</strong> participants match <strong>"${esc(q)}"</strong>` : `<strong>${filtered.length}</strong> participants registered`;
  return `<div class="results-count">${countLabel}</div>`+filtered.map(name=>renderParticipantCard(name)).join('');
}

function renderParticipantCard(name) {

  const activeTab = typeof isOpen === 'string' ? isOpen : 'panels';
  const booth = p.booth||'';
  const publisher = p.publisher||'';
  const bio = getEffectiveBio(name);
  const series = getEffectiveSeries(name);
  const social = p.social||{};
  const fanEvents = p.fanEvents||[];
  const hasFanEvents = fanEvents.length>0;

  const chips = [
    booth?`<span class="meta-chip booth">🏪 Booth ${esc(booth)}</span>`:'',
    publisher?`<span class="meta-chip pub">📚 ${esc(publisher)}</span>`:'',
  ].filter(Boolean).join('');

  // BODY TABS
  const bodyTabsHtml = `<div class="body-tabs">
    <div class="body-tab ${activeTab==='panels'?'active':''}" onclick="switchBodyTab('${escA(name)}','panels')">Panels (${appearances.length})</div>
    <div class="body-tab ${activeTab==='profile'?'active':''}" onclick="switchBodyTab('${escA(name)}','profile')">Profile</div>
    <div class="body-tab ${activeTab==='connect'?'active':''}" onclick="switchBodyTab('${escA(name)}','connect')">Fan Connect${hasFanEvents?' ★':''}</div>
    ${adminMode?`<div class="body-tab ${activeTab==='edit'?'active':''}" onclick="switchBodyTab('${escA(name)}','edit')">✏ Edit</div>`:''}
  </div>`;

  // PANELS SECTION
  const panelItems = appearances.map(({panel,role})=>`
    <div class="panel-item">
      ${dayPill(panel.day)}
      <div>
        <div class="panel-title">${esc(panel.title)}</div>
        <div class="panel-meta"><span>🕐 ${panel.time}</span><span>📍 ${panel.location}</span><span class="panel-role">⚔ ${role}</span></div>
      </div>
    </div>`).join('');

  // PROFILE SECTION
  const socialLinks = Object.entries(social).filter(([k,v])=>v).map(([k,v])=>`<a class="social-link" href="${esc(v)}" target="_blank" rel="noopener">${esc(k)}</a>`).join('');
  const seriesTags = series.map(s=>`<span class="series-tag">${esc(s)}</span>`).join('');
  const profileHtml = `<div class="body-section${activeTab==='profile'?' active':''}">
    <div class="profile-grid">
      <div>${avatarHtml(name,'lg')}</div>
      <div>
        ${bio?`<div class="bio-text">${esc(bio)}</div>`:'<div class="bio-text" style="color:var(--muted);font-style:italic">No bio yet.</div>'}
        ${publisher?`<div class="info-row"><span class="info-label">Publisher</span><span class="info-val">${esc(publisher)}</span></div>`:''}
        ${booth?`<div class="info-row"><span class="info-label">Booth</span><span class="info-val">${esc(booth)}</span></div>`:''}
        ${series.length?`<div class="info-row"><span class="info-label">Series</span><div class="series-list">${seriesTags}</div></div>`:''}
        ${socialLinks?`<div class="social-links" style="margin-top:8px">${socialLinks}</div>`:''}
      </div>
    </div>
  </div>`;

  // CONNECT SECTION
  const eventsHtml = fanEvents.length
    ? fanEvents.map(e=>`<div class="fan-event">
        <div class="fan-event-title">${esc(e.title||'Untitled Event')}</div>
        <div class="fan-event-meta">
          ${e.day?`<span>📅 ${esc(e.day)}</span>`:''}
          ${e.time?`<span>🕐 ${esc(e.time)}</span>`:''}
          ${e.location?`<span>📍 ${esc(e.location)}</span>`:''}

        </div>
        ${e.description?`<div class="fan-event-desc">${esc(e.description)}</div>`:''}
      </div>`).join('')
    : `<div class="no-events">No fan events scheduled yet. Check back!</div>`;
  const connectHtml = `<div class="body-section${activeTab==='connect'?' active':''}">${eventsHtml}</div>`;

  // EDIT SECTION (admin only)
  const editHtml = adminMode ? `<div class="body-section${activeTab==='edit'?' active':''}">
    ${renderAdminForm(name)}
  </div>` : '';

  return `<div class="panelist-card${isOpen?' open':''}" id="card-${escA(name)}">

function toggleCard(name) {
  if (openCards[name]) { delete openCards[name]; } else { openCards[name]='panels'; }
  render();
}
function switchBodyTab(name, tab) {
  openCards[name] = tab;
  render();
}
function searchPerson(name) {
  currentView='people'; searchTerm=name;
  document.getElementById('search').value=name;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelector('[data-view="people"]').classList.add('active');
  openCards[name]='panels';
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

function addFanEvent(name) {
  if (!profiles[name]) profiles[name]={};
  if (!profiles[name].fanEvents) profiles[name].fanEvents=[];
  profiles[name].fanEvents.push({title:'',day:'',time:'',location:'',duration:'',description:''});
  openCards[name]='edit';
  render();
}
function removeFanEvent(name, idx) {
  if (!profiles[name]||!profiles[name].fanEvents) return;
  profiles[name].fanEvents.splice(idx,1);
  openCards[name]='edit';
  render();
}
function updateFanEventField(name, idx, field, val) {
  if (!profiles[name]) profiles[name]={};
  if (!profiles[name].fanEvents) profiles[name].fanEvents=[];
  if (!profiles[name].fanEvents[idx]) profiles[name].fanEvents[idx]={};
  profiles[name].fanEvents[idx][field]=val;
}

function saveAdminForm(name) {
  if (!profiles[name]) profiles[name]={};
  const g=id=>{ const el=document.getElementById(id); return el?el.value.trim():''; };
  const seriesRaw = g(`af-series-${name}`);
  const series = seriesRaw ? seriesRaw.split(',').map(s=>s.trim()).filter(Boolean) : [];
  profiles[name].photo = g(`af-photo-${name}`);
  profiles[name].bio = g(`af-bio-${name}`);
  profiles[name].publisher = g(`af-pub-${name}`);
  profiles[name].booth = g(`af-booth-${name}`);
  profiles[name].series = series;
  profiles[name].social = {
    Website:g(`af-web-${name}`), Amazon:g(`af-amz-${name}`),
    Twitter:g(`af-twit-${name}`), Instagram:g(`af-ig-${name}`),
    TikTok:g(`af-tt-${name}`), Patreon:g(`af-pat-${name}`),
    Discord:g(`af-disc-${name}`)
  };
  const fb = document.getElementById(`sf-${name}`);
  if (fb) fb.textContent = '⏳ Saving…';
  saveProfile(name).then(()=>{
    if (fb){fb.textContent='✓ Saved!';fb.classList.add('show');setTimeout(()=>{fb.classList.remove('show');fb.textContent='✓ Saved!';},2000);}
    render();
  }).catch(()=>{
    if (fb){fb.textContent='✗ Error saving';fb.classList.add('show');setTimeout(()=>fb.classList.remove('show'),3000);}
  });
}

// ═══════════════════════════════════════════════════════
// MEETINGS & CONNECTIONS LOG (admin only)
// ═══════════════════════════════════════════════════════
const HOTEL_LOCATIONS = [
  'Colorado Ballroom','Crystal Peak','Sopris A','Sopris B','Columbia','Harvard','Yale','Princeton',
  'Grand Hyatt Lobby','Lobby Bar','Restaurant/Café','Hotel Hallway','Exhibitor Hall','Outdoor Terrace','Other'
];

function renderMeetingsView(q) {
  const ql = q.toLowerCase();
  const filtered = meetings.filter(m => {
    if (!ql) return true;
    return m.participants.some(p=>p.toLowerCase().includes(ql)) ||
           (m.topic||'').toLowerCase().includes(ql) ||
           (m.hotelLocation||'').toLowerCase().includes(ql);
  }).slice().reverse(); // newest first

  const formHtml = meetingFormOpen ? `
    <div class="meeting-form-wrap">
      <div class="meeting-form-title">⚔ Log New Meeting</div>
      <div class="admin-form">
        <div class="admin-field">
          <label>Participants (search &amp; add)</label>
          <div class="participant-search-dropdown">
            <input type="text" class="participant-search-input" id="pSearchInput"
              placeholder="Type a name…" autocomplete="off"
              oninput="filterParticipantDropdown(this.value)"
              onfocus="openParticipantDropdown()"
              onblur="setTimeout(closeParticipantDropdown,200)">
            <div class="participant-dropdown-list" id="pDropdown"></div>
          </div>
          <div class="selected-participants" id="selectedParticipants">
            ${meetingFormParticipants.map(p=>`<span class="sel-chip" onclick="removeMeetingParticipant('${escA(p)}')">${esc(p)} <span class="sel-chip-x">✕</span></span>`).join('')}
            ${meetingFormParticipants.length===0?`<span style="font-size:11px;color:var(--muted);font-style:italic">No participants added yet</span>`:''}
          </div>
        </div>
        <div class="admin-row">
          <div class="admin-field">
            <label>Date &amp; Time</label>
            <input type="datetime-local" id="mDatetime" style="color-scheme:dark"
              class="participant-search-input" value="${new Date().toISOString().slice(0,16)}">
          </div>
          <div class="admin-field">
            <label>Hotel Location</label>
            <select id="mLocation" class="admin-select" style="margin-bottom:0">
              <option value="">— Select location —</option>
              ${HOTEL_LOCATIONS.map(l=>`<option value="${esc(l)}">${esc(l)}</option>`).join('')}
            </select>
          </div>
        </div>
        <div class="admin-field">
          <label>Topic / Notes</label>
          <textarea id="mTopic" class="admin-field textarea" style="width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:Inter,sans-serif;font-size:13px;padding:9px 12px;border-radius:6px;outline:none;resize:vertical;min-height:60px" placeholder="What was discussed? Any follow-up?"></textarea>
        </div>
        <div class="btn-row">
          <button class="admin-save-btn" onclick="saveMeeting()">Save Meeting</button>
          <button class="admin-cancel-btn" onclick="cancelMeetingForm()">Cancel</button>
        </div>
      </div>
    </div>` : '';

  const meetingCards = filtered.length ? filtered.map(m => {
    const dt = m.datetime ? new Date(m.datetime) : null;
    const dtStr = dt ? dt.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}) + ' · ' + dt.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}) : '';
    const chips = m.participants.map(p=>`<span class="meeting-participant-chip" onclick="searchPerson('${escA(p)}')">${esc(p)}</span>`).join('');
    return `<div class="meeting-card">
      <div class="meeting-card-header">
        <div style="flex:1">
          <div class="meeting-participants">${chips||'<span style="font-size:11px;color:var(--muted);font-style:italic">No participants logged</span>'}</div>
          <div class="meeting-meta">
            ${dtStr?`<span>🕐 ${esc(dtStr)}</span>`:''}
            ${m.hotelLocation?`<span>📍 ${esc(m.hotelLocation)}</span>`:''}
          </div>
          ${m.topic?`<div class="meeting-topic">${esc(m.topic)}</div>`:''}
          <div class="meeting-id">ID: ${m.id}</div>
        </div>
        <button class="meeting-remove" onclick="removeMeeting('${escA(m.id)}')" title="Delete meeting">✕</button>
      </div>
    </div>`;
  }).join('') : `<div class="meetings-empty">No meetings logged yet. Use the button above to log your first connection.</div>`;

  const count = filtered.length;
  const countLabel = q
    ? `<strong>${count}</strong> meeting${count!==1?'s':''} match <strong>"${esc(q)}"</strong>`
    : `<strong>${meetings.length}</strong> meeting${meetings.length!==1?'s':''} logged`;

  return `<div class="meetings-wrap">
    <div class="meetings-header">
      <div>
        <div class="meetings-title">🤝 Meetings &amp; Connections Log</div>
        <div class="meetings-subtitle">Admin only · synced to Supabase</div>
      </div>
      ${!meetingFormOpen?`<button class="add-meeting-btn" onclick="openMeetingForm()">+ Log Meeting</button>`:''}
    </div>
    ${formHtml}
    <div class="results-count">${countLabel}</div>
    ${meetingCards}
  </div>`;
}

function openMeetingForm() {
  meetingFormOpen = true;
  meetingFormParticipants = [];
  render();
  setTimeout(()=>{ const el=document.getElementById('pSearchInput'); if(el) el.focus(); },50);
}
function cancelMeetingForm() { meetingFormOpen=false; meetingFormParticipants=[]; render(); }

function filterParticipantDropdown(q) {
  meetingDropdownQuery = q;
  const dd = document.getElementById('pDropdown');
  if (!dd) return;
  if (!q) { dd.classList.remove('open'); dd.innerHTML=''; return; }
  const ql = q.toLowerCase();
  const matches = sortedNames.filter(n => n.toLowerCase().includes(ql) && !meetingFormParticipants.includes(n)).slice(0,8);
  if (!matches.length) { dd.classList.remove('open'); return; }
  dd.innerHTML = matches.map(n=>`<div class="participant-dropdown-item" onmousedown="addMeetingParticipant('${escA(n)}')">${esc(n)}</div>`).join('');
  dd.classList.add('open');
}
function openParticipantDropdown() { if(meetingDropdownQuery) filterParticipantDropdown(meetingDropdownQuery); }
function closeParticipantDropdown() { const dd=document.getElementById('pDropdown'); if(dd){dd.classList.remove('open');} }

function addMeetingParticipant(name) {
  if (!meetingFormParticipants.includes(name)) meetingFormParticipants.push(name);
  const inp = document.getElementById('pSearchInput');
  if (inp) { inp.value=''; meetingDropdownQuery=''; }
  closeParticipantDropdown();
  const sp = document.getElementById('selectedParticipants');
  if (sp) {
    sp.innerHTML = meetingFormParticipants.map(p=>`<span class="sel-chip" onclick="removeMeetingParticipant('${escA(p)}')">${esc(p)} <span class="sel-chip-x">✕</span></span>`).join('');
  }
}
function removeMeetingParticipant(name) {
  meetingFormParticipants = meetingFormParticipants.filter(p=>p!==name);
  const sp = document.getElementById('selectedParticipants');
  if (sp) {
    sp.innerHTML = meetingFormParticipants.length
      ? meetingFormParticipants.map(p=>`<span class="sel-chip" onclick="removeMeetingParticipant('${escA(p)}')">${esc(p)} <span class="sel-chip-x">✕</span></span>`).join('')
      : `<span style="font-size:11px;color:var(--muted);font-style:italic">No participants added yet</span>`;
  }
}

async function saveMeeting() {
  const datetime = document.getElementById('mDatetime')?.value || '';
  const hotelLocation = document.getElementById('mLocation')?.value || '';
  const topic = document.getElementById('mTopic')?.value?.trim() || '';
  if (!meetingFormParticipants.length) { alert('Add at least one participant before saving.'); return; }
  const meeting = {
    id: Date.now().toString(36),
    participants: [...meetingFormParticipants],
    datetime, hotelLocation, topic,
    createdAt: new Date().toISOString()
  };
  try {
    await saveMeetingToDb(meeting);
    meetings.push(meeting);
  } catch(e) { alert('Error saving meeting: ' + e.message); return; }
  meetingFormOpen = false;
  meetingFormParticipants = [];
  render();
}

async function removeMeeting(id) {
  if (!confirm('Delete this meeting log entry?')) return;
  try {
    await deleteMeetingFromDb(id);
    meetings = meetings.filter(m=>m.id!==id);
    render();
  } catch(e) { alert('Error deleting: ' + e.message); }
}

// ═══════════════════════════════════════════════════════
// MEETUPS VIEW
// ═══════════════════════════════════════════════════════
const DAY_ORDER = {Thursday:0,Friday:1,Saturday:2,Sunday:3};

function parseSortKey(e) {
  const dayVal = DAY_ORDER[e.day] ?? 99;
  const timeStr = (e.time||'').toUpperCase();
  const m = timeStr.match(/(\d+):(\d+)\s*(AM|PM)?/);
  if (!m) return dayVal * 10000 + 9999;
  let h = parseInt(m[1]), min = parseInt(m[2]);
  const period = m[3];
  if (period === 'PM' && h !== 12) h += 12;
  if (period === 'AM' && h === 12) h = 0;
  return dayVal * 10000 + h * 100 + min;
}

function renderEventsView(q) {
  const ql = q.toLowerCase();

  // Collect all events first (unfiltered) to build room list
  const allEventsRaw = [];
  sortedNames.forEach(name => {
    const p = getProfile(name);
    (p.fanEvents||[]).forEach(e => allEventsRaw.push({name, event:e}));
  });

  // Unique rooms present in the data
  const rooms = [...new Set(allEventsRaw.map(x=>x.event.location||'').filter(Boolean))].sort();

  // Apply search + room filter
  const allEvents = allEventsRaw.filter(({name, event:e}) => {
    const matchesSearch = !ql ||
      name.toLowerCase().includes(ql) ||
      (e.title||'').toLowerCase().includes(ql) ||
      (e.location||'').toLowerCase().includes(ql) ||
      (e.description||'').toLowerCase().includes(ql);
    const matchesRoom = !mgRoomFilter || (e.location||'') === mgRoomFilter;
    return matchesSearch && matchesRoom;
  });

  // Sort chronologically
  allEvents.sort((a,b) => parseSortKey(a.event) - parseSortKey(b.event));

  // Room filter pills (only show if rooms exist)
  const roomPills = rooms.length ? `
    <div class="mg-room-filters">
      <button class="mg-room-pill${!mgRoomFilter?' active':''}" onclick="setMgRoom('')">All Rooms</button>
      ${rooms.map(r=>`<button class="mg-room-pill${mgRoomFilter===r?' active':''}" onclick="setMgRoom('${escA(r)}')">${esc(r)}</button>`).join('')}
    </div>` : '';

  if (!allEvents.length) {
    const hint = adminMode
      ? 'Open any participant card → ✏ Edit → scroll to Meetup Events → Add Event.'
      : 'Check back soon — the schedule is being updated.';
    return `${roomPills}<div class="empty-state">
      <div class="icon">🤩</div>
      <p style="margin-bottom:8px">${mgRoomFilter ? `No Meetups in <strong>${esc(mgRoomFilter)}</strong>.` : 'No Meetups scheduled yet.'}</p>
      <p style="font-size:12px;color:var(--muted)">${hint}</p>
    </div>`;
  }

  // Group by day
  const byDay = {};
  allEvents.forEach(entry => {
    const day = entry.event.day || 'TBD';
    if (!byDay[day]) byDay[day] = [];
    byDay[day].push(entry);
  });

  const dayOrder = ['Thursday','Friday','Saturday','Sunday','TBD'];
  const dayColors = {Thursday:'#2ecc71',Friday:'#3a7bd5',Saturday:'#9b59b6',Sunday:'#e67e22',TBD:'#6a7a8e'};
  const dayDates = {Friday:'Jul 10',Saturday:'Jul 11',Sunday:'Jul 12'};

  const countLabel = (q||mgRoomFilter)
    ? `<strong>${allEvents.length}</strong> meetup${allEvents.length!==1?'s':''} match${mgRoomFilter?` in <strong>${esc(mgRoomFilter)}</strong>`:''}`
    : `<strong>${allEvents.length}</strong> meetup${allEvents.length!==1?'s':''} scheduled`;

  let html = `${roomPills}<div class="results-count">${countLabel}</div>`;

  dayOrder.forEach(day => {
    if (!byDay[day]) return;
    const dateLabel = dayDates[day] ? ` · ${dayDates[day]}` : '';
    html += `<div class="schedule-day">
      <div class="day-heading">
        <span class="day-dot" style="background:${dayColors[day]||'#6a7a8e'}"></span>
        ${esc(day)}${dateLabel}
      </div>
      <div class="mg-grid">`;

    byDay[day].forEach(({name, event:e}) => {
      const photo = getEffectivePhoto(name);
      const photoHtml = photo
        ? `<img class="mg-photo" src="${esc(photo)}" alt="${esc(name)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="mg-photo-placeholder" style="display:none">👤</div>`
        : `<div class="mg-photo-placeholder">👤</div>`;

      html += `<div class="mg-card">
        <div class="mg-card-inner">
          <div class="mg-photo-wrap">${photoHtml}</div>
          <div class="mg-info">
            <div class="mg-name" onclick="searchPerson('${escA(name)}')">${esc(name)}</div>
            ${e.title?`<div class="mg-event-title">${esc(e.title)}</div>`:''}
            <div class="mg-meta">
              ${e.time?`<span>🕐 ${esc(e.time)}${e.duration?' · '+esc(e.duration):''}</span>`:''}
              ${e.location?`<span>📍 ${esc(e.location)}</span>`:''}
            </div>
            ${e.description?`<div class="mg-desc">${esc(e.description)}</div>`:''}
          </div>
        </div>
      </div>`;
    });

    html += `</div></div>`;
  });

  return html;
}

function setMgRoom(room) {
  mgRoomFilter = room;
  render();
}

// ═══════════════════════════════════════════════════════
// SCHEDULE VIEW
// ═══════════════════════════════════════════════════════
function renderScheduleView(q, dayFilter) {
  const ql = q.toLowerCase();
  const days = dayFilter==='schedule'?['Friday','Saturday','Sunday']:[dayFilter.charAt(0).toUpperCase()+dayFilter.slice(1)];
  const dayColors = {Friday:'#3a7bd5',Saturday:'#9b59b6',Sunday:'#e67e22'};
  let html='', total=0;
  days.forEach(day=>{
    const dayPanels = panels.filter(p=>{
      if(p.day!==day) return false;
      if(!ql) return true;
      return p.title.toLowerCase().includes(ql)||p.description.toLowerCase().includes(ql)||(p.panelists||[]).some(n=>n.toLowerCase().includes(ql))||(p.moderator||'').toLowerCase().includes(ql)||(p.location||'').toLowerCase().includes(ql);
    });
    if(!dayPanels.length) return;
    total+=dayPanels.length;
    const byTime={};
    dayPanels.forEach(p=>{if(!byTime[p.time])byTime[p.time]=[];byTime[p.time].push(p);});
    html+=`<div class="schedule-day"><div class="day-heading"><span class="day-dot" style="background:${dayColors[day]}"></span>${day}, July ${day==='Friday'?10:day==='Saturday'?11:12}, 2026</div>`;
    Object.entries(byTime).forEach(([time,ps])=>{
      html+=`<div class="time-block"><div class="time-label">🕐 ${time}</div>`;
      ps.forEach(p=>{
        const chips=[];
        if(p.moderator) chips.push(`<span class="chip mod-chip" onclick="searchPerson('${escA(p.moderator)}')">⚔ ${esc(p.moderator)}</span>`);
        (p.panelists||[]).forEach(n=>chips.push(`<span class="chip" onclick="searchPerson('${escA(n)}')">${esc(n)}</span>`));
        (p.guests||[]).forEach(n=>chips.push(`<span class="chip">${esc(n)}</span>`));
        html+=`<div class="panel-card"><div class="panel-card-title">${esc(p.title)}</div><div class="panel-card-loc">📍 ${p.location}</div><div class="panel-card-desc">${esc(p.description)}</div><div class="panelist-chips">${chips.join('')}</div></div>`;
      });
      html+=`</div>`;
    });
    html+=`</div>`;
  });
  if(!html) return emptyState('No panels found.');
  return `<div class="results-count"><strong>${total}</strong> panels</div>${html}`;
}

function emptyState(msg){return`<div class="empty-state"><div class="icon">🗡️</div><p>${msg}</p></div>`}

// ═══════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════
function render() {
  const main = document.getElementById('main');
  let html = '';
  if (currentView==='people') html=renderPeopleView(searchTerm);
  else if (currentView==='events') html=renderEventsView(searchTerm);
  else if (currentView==='meetings') html=renderMeetingsView(searchTerm);
  else html=renderScheduleView(searchTerm,currentView);
  main.innerHTML=html;
}

// EVENTS
document.getElementById('search').addEventListener('input',e=>{searchTerm=e.target.value.trim();render();});
document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    const newView = tab.dataset.view;
    if (newView !== 'events') mgRoomFilter = '';
    currentView = newView;
    render();
  });
});

render(); // initial render with no admin data; data loads after sign-in
